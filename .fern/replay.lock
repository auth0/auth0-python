  - id: patch-f182694f
    content_hash: sha256:5b0050902cba2aa5b86585d4eabba3987354307a1721cf12a9a94422ee371470
    original_commit: f182694f50720cacb568ff5c7a1894b0dd972373
    original_message: "fix: Add top-level `py.typed` marker to resolve IDE import errors (#829)"
    original_author: Snehil Kishore <snehil.kishore@okta.com>
    base_generation: c1c18146c845e6c7916d0490f7ef02807f9bfebf
    files:
      - src/auth0/py.typed
    patch_content: |+
      From f182694f50720cacb568ff5c7a1894b0dd972373 Mon Sep 17 00:00:00 2001
      From: Snehil Kishore <snehil.kishore@okta.com>
      Date: Mon, 4 May 2026 15:36:32 +0530
      Subject: [PATCH] fix: Add top-level `py.typed` marker to resolve IDE import
       errors (#829)

      ## Changes

      - Adds a `py.typed` marker at the root package level
      (`src/auth0/py.typed`).

      The marker previously only existed under `src/auth0/management/`,
      causing IDEs like PyCharm to fall back to outdated [typeshed
      stubs](https://github.com/python/typeshed/pull/14697) and report
      unresolved imports for `ManagementClient`, `ApiError`, and other
      classes. A root-level marker signals IDEs to use the package's own
      inline types instead.

      Closes #824
      Related: #804, #793
      ---
       .fernignore        | 3 ++-
       src/auth0/py.typed | 0
       2 files changed, 2 insertions(+), 1 deletion(-)
       create mode 100644 src/auth0/py.typed

      diff --git a/.fernignore b/.fernignore
      index f0e9481..9c29793 100644
      --- a/.fernignore
      +++ b/.fernignore
      @@ -16,8 +16,9 @@ CHANGELOG.md
       src/auth0/authentication/
       tests/authentication/
       
      -# Root auth0 __init__.py
      +# Root auth0 __init__.py and py.typed marker
       src/auth0/__init__.py
      +src/auth0/py.typed
       
       # Telemetry customization (Auth0 format with dynamic versioning)
       src/auth0/management/core/client_wrapper.py
      diff --git a/src/auth0/py.typed b/src/auth0/py.typed
      new file mode 100644
      index 0000000..e69de29
      -- 
      2.52.0

    theirs_snapshot:
      src/auth0/py.typed: ""
    user_owned: true
